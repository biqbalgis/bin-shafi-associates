services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    environment:
      DB_ENGINE: django.db.backends.postgresql
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    volumes:
      - staticfiles:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
    command: >
      /bin/sh -c '
      TEMPLATE=/etc/nginx/templates/init.conf.template;
      if [ -f /etc/letsencrypt/live/$${DOMAIN}/fullchain.pem ]; then
        TEMPLATE=/etc/nginx/templates/prod.conf.template;
      fi;
      sed "s/__DOMAIN__/$${DOMAIN}/g" "$${TEMPLATE}" > /etc/nginx/conf.d/default.conf;
      exec nginx -g "daemon off;";
      '
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/init.conf.template:/etc/nginx/templates/init.conf.template:ro
      - ./deploy/nginx/prod.conf.template:/etc/nginx/templates/prod.conf.template:ro
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
      - staticfiles:/var/www/static
    depends_on:
      - frontend
      - backend

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt

volumes:
  postgres_data:
  staticfiles:
  certbot_www:
  letsencrypt:
